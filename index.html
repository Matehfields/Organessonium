<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Organessônium</title>
  <link rel="icon" type="image/png" href="image/logo.png">
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #111827;
      --card: rgba(17, 24, 39, 0.72);
      --border: rgba(255, 255, 255, 0.12);
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #60a5fa;
      --accent-2: #34d399;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: Inter, Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(96, 165, 250, 0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(52, 211, 153, 0.12), transparent 25%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text);
      display: grid;
      place-items: center;
      overflow: hidden;
      padding: 24px;
    }

    .container {
      width: min(100%, 720px);
      padding: 24px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: clamp(28px, 5vw, 48px);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -2px;
      background: linear-gradient(120deg, transparent 35%, rgba(255,255,255,0.14), transparent 65%);
      transform: translateX(-100%);
      animation: shine 6s infinite;
      pointer-events: none;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border: 1px solid rgba(96, 165, 250, 0.35);
      background: rgba(96, 165, 250, 0.12);
      color: #bfdbfe;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 22px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent-2);
      box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.7);
      animation: pulse 1.8s infinite;
    }

    h1 {
      font-size: clamp(2rem, 4vw, 3.5rem);
      line-height: 1.1;
      margin-bottom: 16px;
      letter-spacing: -0.03em;
    }

    p {
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.1rem);
      line-height: 1.7;
      max-width: 58ch;
      margin: 0 auto;
    }

    .progress-wrap {
      margin: 32px auto 0;
      width: min(100%, 420px);
      text-align: left;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #cbd5e1;
      font-size: 0.95rem;
      margin-bottom: 10px;
    }

    .progress {
      width: 100%;
      height: 14px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .bar {
      height: 100%;
      width: 8%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 30px rgba(96, 165, 250, 0.35);
      animation: load 2.2s ease-in-out infinite alternate;
    }

    .footer {
      margin-top: 28px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .actions {
      margin-top: 28px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .button {
      display: inline-block;
      text-decoration: none;
      color: white;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
      padding: 12px 18px;
      border-radius: 14px;
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
      font-weight: 600;
    }

    .button:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.22);
    }

    .button.primary {
      background: linear-gradient(90deg, rgba(96, 165, 250, 0.95), rgba(52, 211, 153, 0.95));
      border-color: transparent;
      color: #081120;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.55); }
      70% { box-shadow: 0 0 0 14px rgba(52, 211, 153, 0); }
      100% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); }
    }

    @keyframes load {
      from { transform: translateX(0); }
      to { transform: translateX(4%); }
    }

    @keyframes shine {
      0% { transform: translateX(-120%) skewX(-20deg); }
      50% { transform: translateX(120%) skewX(-20deg); }
      100% { transform: translateX(120%) skewX(-20deg); }
    }

    @media (max-width: 480px) {
      .card {
        border-radius: 22px;
        padding: 24px;
      }

      .progress-label {
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="card">
      <div class="badge"><span class="dot"></span> Projeto em desenvolvimento</div>
      <h1>Estou construindo algo novo</h1>
      <p>
        Esta parte do projeto ainda está em desenvolvimento. Estou trabalhando para entregar
        uma experiência completa, organizada e pronta para uso.
      </p>

      <div class="progress-wrap">
        <div class="progress-label">
          <span>Progresso do projeto</span>
          <span>8%</span>
        </div>
        <div class="progress" aria-hidden="true">
          <div class="bar"></div>
        </div>
      </div>
      <div class="footer">
        Fique atento: em breve terei a versão final disponível.
      </div>
    </section>
  </main>
</body>
</html>
