<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Teste do Servidor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .box {
            text-align: center;
            padding: 30px;
            border: 2px solid #444;
            border-radius: 10px;
            background-color: #1c1c1c;
        }

        h1 {
            color: #4CAF50;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Servidor funcionando!</h1>
        <p>Se você está vendo isso, está tudo certo 🎉</p>
        <button onclick="mostrarMensagem()">Clique aqui</button>
        <p id="mensagem"></p>
    </div>

    <script>
        function mostrarMensagem() {
            document.getElementById("mensagem").innerText = "JavaScript também está funcionando!";
        }
    </script>
</body>
</html>
